---
###############################################################################
# Satisfactory
###############################################################################

# 1. Is this role applied to a container?
#
# Decision: manual user setting - There is currently no good way to
#     deterministically and consistently detect if a remote host is a
#     container outside of common cases.
#
# Special Case:
#   * deb_flg_container=true forces satisfactory_flg_container=true.
#
# Default: False.
satisfactory_flg_container: false

# 2. Force Static IP for client-download.steampowered.com?
#
# client-download.steampowered.com is used for internet connectivity checks and
# to download data. CDN DNS updates may break this for up to 72 hours. steamcmd
# will fail with 'Please confirm your network connection and try again.'.
#
# Enabling resolves media.steampowered.com and statically sets /etc/hosts which
# fix this specific issue. Requires satisfactory_flg_container=false.
#
# This should ONLY be used as a one-off and not set by default as changing IP's
# will result in steamcmd breaking again in the future.
#
# Reference:
# * https://r-pufky.github.io/docs/game/steam/troubleshooting
satisfactory_flg_cdn: false

# 3. Force Satisfactory server updates if already installed?
#
# Server will be updated during role application and as a pre-start task for
# service start. Disable to prevent updates after initial installation.
#
# Default: False.
satisfactory_flg_update: false

# 4. Set configuration files? Default: False.
satisfactory_flg_config: false

# 5. Enable scheduled server backup?
#
# Satisfactory does not automatically create saves unless manually enabled. See
# satisfactory_cfg_backup_*.
#
# Default: False
#
# Reference:
# * https://satisfactory.wiki.gg/wiki/Dedicated_servers#Configuration
satisfactory_flg_backup: false

###############################################################################
# Service
###############################################################################

# Additional steamcmd options to use during app_update.
#
# Use 'validate' to checksum installed files for corruption.
#
# Default: [].
satisfactory_srv_update_opts: []

# Server launch options.
#
# Command line options passed to dedicated server. Use only options that must
# be set for service to start. Place all other options in configuration files.
#
# Default: [].
#
# Reference:
# * https://satisfactory.wiki.gg/wiki/Dedicated_servers#Command_line_options
satisfactory_srv_launch_opts: []

# Satisfactory branch.
#
# Values:
#         public: Stable branch (default).
#   experimental: Experimental branch.
#
# Default: 'public'.
satisfactory_srv_branch: 'public'

###############################################################################
# Config
###############################################################################

# Satisfactory server configuration to set.
#
# Ansible controller path to source directory (treated as a jinja2 templates
# allowing for ansible variable use). Overwrites existing
# /home/steam/satisfactory/FactoryGame/Saved/Config/LinuxServer/* files.
#
# Files not specified will be removed and automatically regenerated to defaults
# on first run server startup and shutdown.
#
# Role contains two example configurations:
# * templates/default - Vanilla auto-generated server settings.
# * templates/4_player - Minimal changes for a 4 player server.
#
# satisfactory_cfg_d: 'host_vars/sat.example.com/data/config'
#
# Default: '' (use auto-generated defaults on startup).
#
# Reference:
# * https://satisfactory.wiki.gg/wiki/Dedicated_servers/Configuration_files
satisfactory_cfg_d: ''

# Backup
###############################################################################

# Root backup location. Default: '/srv/backup/satisfactory'.
satisfactory_cfg_backup_d: '/srv/backup/satisfactory'

# Backup schedule (systemd TIME format).
#
# Default: '1d' (daily).
#
# Reference:
# * https://www.freedesktop.org/software/systemd/man/latest/systemd.time.html
satisfactory_cfg_backup_schedule: '1d'
