---
- name: 'Prep'
  ansible.builtin.import_tasks: 'prep.yml'
- name: 'Install'
  ansible.builtin.import_tasks: 'install.yml'

- name: 'Update'
  when: >
    satisfactory_flg_update or
    (not satisfactory__cfg._is_installed or
     satisfactory__cfg._installed_branch != satisfactory__srv._branch)
  ansible.builtin.import_tasks: 'update.yml'

- name: 'Config'
  when: satisfactory_flg_config
  ansible.builtin.import_tasks: 'config.yml'

- name: 'Backup'
  ansible.builtin.import_tasks: 'backup.yml'
- name: 'Start'
  ansible.builtin.import_tasks: 'start.yml'
