---
###############################################################################
# Backup
###############################################################################
# Deploy backup services.

- name: 'Backup | systemd | enable backup'
  when: satisfactory_flg_backup
  notify: 'Handlers | enable satisfactory_backup'
  ansible.builtin.template:
    src: '{{ "systemd/" ~ item ~ ".j2" }}'
    dest: '{{ "/etc/systemd/system/" ~ item }}'
    owner: 'root'
    group: 'root'
    mode: '0644'
  loop:
    - 'satisfactory_backup.service'
    - 'satisfactory_backup.timer'

- name: 'Backup | systemd | disable backup'
  when: not satisfactory_flg_backup
  notify: 'Handlers | disable satisfactory_backup'
  ansible.builtin.file:
    path: '{{ "/etc/systemd/system/" ~ item }}'
    state: 'absent'
  loop:
    - 'satisfactory_backup.service'
    - 'satisfactory_backup.timer'
