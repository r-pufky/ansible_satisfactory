---
###############################################################################
# Default
###############################################################################
# Default values result in running Satisfactory server.
#
# Tests:
# * Satisfactory server is running.

dependency:
  name: 'galaxy'
driver:
  name: 'vagrant'
  provider:
    name: 'libvirt'
    type: 'libvirt'
provisioner:
  name: 'ansible'
  connection_options:
    ansible_ssh_user: 'vagrant'
    ansible_become: true
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
  inventory:
    group_vars:
      all:
        molecule_flg_inject: true
        satisfactory_flg_backup: true
        satisfactory_flg_config: true
        satisfactory_cfg_d: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~ "/templates/4_player"
          }}'
platforms:
  - name: 'satisfactory-default'
    box: 'debian/trixie64'
    memory: 4096
    cpus: 2
    interfaces:
      - network_name: 'private_network'
        auto_config: true
        type: 'dhcp'
    instance_raw_config_args:
      - 'vm.network "forwarded_port", guest: 7777, host: 7777, protocol: "udp"'
      - 'vm.network "forwarded_port", guest: 7777, host: 7777, protocol: "tcp"'
      - 'vm.network "forwarded_port", guest: 8888, host: 8888, protocol: "tcp"'
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'converge'
    - 'verify'
    - 'destroy'
